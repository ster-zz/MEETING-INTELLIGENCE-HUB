<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>DECISIO | Meeting Detail</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                "on-background": "#1b1c19",
                "on-surface": "#1b1c19",
                "surface": "#fbf9f4",
                "primary": "#b02600",
                "secondary": "#0058be",
                "surface-container-low": "#f5f3ee",
                "surface-container-lowest": "#ffffff",
                "surface-container": "#f0eee9",
                "surface-container-high": "#eae8e3",
                "surface-container-highest": "#e4e2dd",
                "outline-variant": "#e8bdb3"
              },
              "borderRadius": {
                "DEFAULT": "0.25rem",
                "lg": "0.5rem",
                "xl": "0.75rem",
                "full": "9999px"
              },
              "fontFamily": {
                "headline": ["Inter"],
                "body": ["Inter"],
                "label": ["Inter"]
              }
            },
          }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .hanging-line { height: 1px; background-color: #1b1c19; width: 100px; }
        .sentiment-Positive { background-color: #10b981; box-shadow: 0 0 10px rgba(16, 185, 129, 0.4); }
        .sentiment-Neutral { background-color: #f59e0b; box-shadow: 0 0 10px rgba(245, 158, 11, 0.4); }
        .sentiment-Negative { background-color: #b02600; box-shadow: 0 0 10px rgba(176, 38, 0, 0.4); }
        
        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(27, 28, 25, 0.1); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(176, 38, 0, 0.3); }

        .transcript-line { transition: all 0.3s ease; border-left: 2px solid transparent; padding-left: 8px; }
        .transcript-line:hover { border-left-color: #b02600; background: rgba(176, 38, 0, 0.02); }
        .highlight-pulse { animation: highlight-fade 3s ease-out; }
        
        @keyframes highlight-fade {
            0% { background-color: #fde68a; }
            100% { background-color: transparent; }
        }

        /* Glass Tabs */
        .tab-active { border-bottom-color: #b02600; color: #b02600; }
    </style>
</head>
<body class="bg-surface text-on-background font-body selection:bg-secondary selection:text-white h-screen overflow-hidden">
    <div class="flex h-screen overflow-hidden">
        <!-- SideNavBar - Full Height Pinterest Style -->
        <aside class="hidden lg:flex flex-col py-8 bg-[#fbf9f4] w-20 border-r border-[#1b1c19] sticky top-0 h-screen z-50 items-center">
            <nav class="flex flex-col gap-6 w-full items-center">
                <!-- Back Home -->
                <a class="group relative flex items-center justify-center w-12 h-12 rounded-2xl text-zinc-500 transition-all hover:bg-on-surface hover:text-white" href="index.html">
                    <span class="material-symbols-outlined">dashboard</span>
                    <span class="absolute left-16 scale-0 group-hover:scale-100 transition-all origin-left bg-[#1b1c19] text-white text-[10px] font-bold px-3 py-1.5 rounded-lg whitespace-nowrap z-50 shadow-xl">
                        Back Home
                    </span>
                </a>
                
                <div class="w-8 h-px bg-on-surface/10 my-2"></div>

                <!-- Core Analysis -->
                <a class="group relative flex items-center justify-center w-12 h-12 rounded-2xl bg-[#e4e2dd] text-[#1b1c19] transition-all hover:bg-on-surface hover:text-white" href="#">
                    <span class="material-symbols-outlined">description</span>
                    <span class="absolute left-16 scale-0 group-hover:scale-100 transition-all origin-left bg-[#1b1c19] text-white text-[10px] font-bold px-3 py-1.5 rounded-lg whitespace-nowrap z-50 shadow-xl">
                        Core Analysis
                    </span>
                </a>
                <!-- Full Transcript -->
                <a class="group relative flex items-center justify-center w-12 h-12 rounded-2xl text-zinc-500 transition-all hover:bg-on-surface hover:text-white" href="#">
                    <span class="material-symbols-outlined">forum</span>
                    <span class="absolute left-16 scale-0 group-hover:scale-100 transition-all origin-left bg-[#1b1c19] text-white text-[10px] font-bold px-3 py-1.5 rounded-lg whitespace-nowrap z-50 shadow-xl">
                        Full Transcript
                    </span>
                </a>
            </nav>
        </aside>

        <!-- Right Side Container -->
        <div class="flex-1 flex flex-col">
            <!-- TopAppBar - Integrated -->
            <nav class="bg-surface flex justify-between items-center px-8 border-b border-outline-variant/30 w-full sticky top-0 z-40 bg-white/80 backdrop-blur-md">
                <div class="flex items-center gap-6 py-4">
                    <a href="index.html" class="flex items-center gap-2 text-zinc-400 hover:text-on-surface transition-colors">
                        <span class="material-symbols-outlined text-xl">chevron_left</span>
                        <span class="text-[10px] font-black uppercase tracking-widest">Back</span>
                    </a>
                    <div class="h-4 w-px bg-outline-variant/30"></div>
                    <div class="flex items-center gap-3 group">
                        <h1 id="meeting-title-header" class="text-sm font-black text-on-surface truncate max-w-[300px] cursor-pointer hover:text-primary transition-colors">Loading...</h1>
                        <button onclick="enableRename()" class="material-symbols-outlined text-zinc-300 hover:text-primary transition-all text-lg scale-0 group-hover:scale-100 origin-left">edit</button>
                    </div>
                    <div class="h-4 w-px bg-outline-variant/30 ml-2"></div>
                    <div class="flex items-center gap-3">
                        <span id="meeting-date" class="text-[10px] font-bold text-zinc-400 uppercase tracking-widest hidden md:inline"></span>
                        <div id="sentiment-indicator" class="w-2 h-2 rounded-full" style="display: none;"></div>
                    </div>
                </div>

                <div class="flex gap-8 items-center">
                    <div class="hidden md:flex gap-8 items-center">
                        <a class="font-extrabold tracking-tight text-zinc-400 hover:text-[#1b1c19] text-sm uppercase" href="#">Export</a>
                        <a class="font-extrabold tracking-tight text-zinc-400 hover:text-[#1b1c19] text-sm uppercase" href="#">Collaborate</a>
                    </div>
                    <div class="flex gap-4 items-center">
                        <button class="font-extrabold tracking-tight text-[#1b1c19] hover:text-[#0058be] text-sm uppercase">Support</button>
                        <button class="bg-[#1b1c19] text-white px-5 py-2 rounded-xl font-bold active:scale-95 transition-transform text-xs uppercase tracking-widest">Settings</button>
                    </div>
                </div>
            </nav>

            <!-- Main Studio Area -->
            <div class="flex flex-1 overflow-hidden h-[calc(100vh-73px)]">
                <!-- Left Pane: Source Hub (Transcript) -->
                <section class="w-[42%] border-r border-outline-variant/30 flex flex-col bg-surface overflow-hidden">
                    <div class="px-8 py-5 border-b border-outline-variant/20 flex justify-between items-center bg-[#fbf9f4]">
                        <div>
                            <h2 class="text-xs font-black uppercase tracking-[0.2em] text-zinc-400 mb-1">Source Material</h2>
                            <p class="text-xs font-bold text-on-surface">Original Transcript</p>
                        </div>
                    </div>
                    <div id="transcript-container" class="flex-1 overflow-y-auto p-10 font-mono text-[13px] leading-relaxed text-zinc-600 space-y-6 custom-scrollbar bg-[#fbf9f4]/50">
                        <!-- Transcript injected by JS -->
                    </div>
                </section>

                <!-- Right Pane: Intelligence Hub -->
                <section class="w-[58%] flex flex-col bg-[#fbf9f4] overflow-hidden">
                    <!-- Intelligence Tabs - Bordered Style -->
                    <div class="px-8 py-4 border-b border-outline-variant/20 flex items-center gap-4 bg-surface">
                        <button onclick="switchTab('analysis')" id="tab-analysis" class="px-6 py-2.5 text-[10px] font-black uppercase tracking-[0.2em] border-2 border-[#b02600] text-[#b02600] rounded-xl transition-all shadow-sm">01. Analysis</button>
                        <button onclick="switchTab('chat')" id="tab-chat" class="px-6 py-2.5 text-[10px] font-black uppercase tracking-[0.2em] border-2 border-outline-variant/30 text-zinc-400 hover:border-zinc-400 rounded-xl transition-all">02. Chat Studio</button>
                    </div>

                    <!-- Content Area (Non-Scrollable Wrapper) -->
                    <div class="flex-1 overflow-hidden relative">
                        <!-- Analysis View (Independent Scroll) -->
                        <div id="analysis-view" class="h-full overflow-y-auto p-12 custom-scrollbar space-y-16">
                            <div id="analysis-content" class="space-y-16 max-w-4xl"></div>
                        </div>
 
                        <!-- Chat View (Independent Flex Layout) -->
                        <div id="chat-view" class="hidden h-full flex flex-col p-8">
                             <div class="bg-white p-8 rounded-3xl border border-outline-variant/30 shadow-sm flex-1 flex flex-col overflow-hidden max-w-4xl">
                                <div id="chat-messages" class="flex-1 space-y-6 overflow-y-auto pr-4 mb-6 custom-scrollbar">
                                    <div class="flex gap-4">
                                        <div class="w-10 h-10 rounded-2xl bg-[#1b1c19] text-white flex items-center justify-center flex-shrink-0">
                                            <span class="material-symbols-outlined text-sm">robot_2</span>
                                        </div>
                                        <div class="bg-surface-container p-6 rounded-3xl rounded-tl-none border border-outline-variant/10 shadow-sm">
                                            <p class="text-sm font-medium leading-relaxed">Intelligence initialized. Ask me anything about the strategy discussed in this meeting.</p>
                                        </div>
                                    </div>
                                </div>
                                <div class="flex gap-4 items-end">
                                    <div class="flex-1 bg-surface-container p-4 rounded-3xl flex items-end gap-4 border border-outline-variant/20 focus-within:border-[#b02600] transition-all bg-[#fbf9f4]/50">
                                        <textarea id="chat-input-text" placeholder="Query context..." class="w-full bg-transparent border-none focus:ring-0 text-sm font-medium p-2 resize-none min-h-[44px]" rows="1"></textarea>
                                        <button id="send-studio-btn" class="w-12 h-12 rounded-2xl bg-[#1b1c19] text-white flex items-center justify-center hover:shadow-xl active:scale-95 transition-all">
                                            <span class="material-symbols-outlined">send</span>
                                        </button>
                                    </div>
                                </div>
                             </div>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        function switchTab(tab) {
            const analysisView = document.getElementById('analysis-view');
            const chatView = document.getElementById('chat-view');
            const tabAnalysis = document.getElementById('tab-analysis');
            const tabChat = document.getElementById('tab-chat');

            if (tab === 'analysis') {
                analysisView.classList.remove('hidden');
                chatView.classList.add('hidden');
                tabAnalysis.classList.add('border-[#b02600]', 'text-[#b02600]');
                tabAnalysis.classList.remove('border-transparent', 'text-zinc-400');
                tabChat.classList.add('border-transparent', 'text-zinc-400');
                tabChat.classList.remove('border-[#b02600]', 'text-[#b02600]');
            } else {
                analysisView.classList.add('hidden');
                chatView.classList.remove('hidden');
                tabChat.classList.add('border-[#b02600]', 'text-[#b02600]');
                tabChat.classList.remove('border-transparent', 'text-zinc-400');
                tabAnalysis.classList.add('border-transparent', 'text-zinc-400');
                tabAnalysis.classList.remove('border-[#b02600]', 'text-[#b02600]');
            }
        }
        document.addEventListener('DOMContentLoaded', fetchMeetingDetails);
    </script>
</body>
</html>
